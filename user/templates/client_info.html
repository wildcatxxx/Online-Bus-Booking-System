{% extends 'base.html' %}
{% load static %}

{% block head %}
<style>
	input, select {
	width:100%;
	color: grey;
	border: 2px  #007bff;
	border-radius: 4px;
	}
</style>
{% endblock  %}

{% block content %}
<div class="hero inner-page" style="background-image: url({% static 'images/bgr.jpg' %});">
        <div class="container">
            <div class="row align-items-end ">
                <div class="col-lg-5">
                    <div class="intro">
                        <h1><strong>Account</strong></h1>
                        <div class="custom-breadcrumbs"><a href="#"></a>
                            <strong></strong>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<div class="header pb-3" >
      <div class="container">
        <div class="header-body">
          <!-- Card stats -->
			{% if messages %}
			{% for message in messages %}
			<div class="alert alert-{{message.tags}}" role="alert" id="message_container">
				{{ message }}
			</div>
			{% endfor %}
			{% endif %}

        </div>
      </div>
    </div>

    <!-- Page content -->
    <div class="container" style="margin-bottom: 30px">
      <div class="row justify-content-center">

		<div class="mb-4 mb-md-0 col-md-4">
          <div class="card bg-default">

            <div class="card-header bg-transparent">
              <div class="row align-items-center">
                <div class="col">

					<h3 class="page-header" style="font-size: 1.5rem;"><strong>Account Info</strong> </h3>

                </div>
              </div>
            </div>
            <div class="card-header bg-default">
              <!-- Chart -->
				<form action="">
					<label for="">Username:</label><br>
					<input type="text" value="{{ user.username }}" readonly><br>
					<label for="">First Name:</label><br>
					<input type="text" value="{{ user.first_name }}" readonly><br>
					<label for="">Last Name:</label><br>
					<input type="text" value="{{ user.last_name }}" readonly><br>
					<label for="">Email:</label><br>
					<input type="email" value="{{ user.email }}" readonly><br>

				</form>
            </div>
          </div>
        </div>


        <div class="mb-4 mb-md-0 col-md-4">
          <div class="card bg-default">
			  <div class="card-header bg-transparent">
              <div class="row align-items-center">
                <div class="col">
					<h3 class="page-header" style="font-size: 1.5rem;"><strong>Contact Info</strong> </h3>
                </div>
              </div>
            </div>
            <div class="card-header bg-default "  >
				<form action="">
					<label >Phone:</label><br>
					<input type="text" value="+233{{ info.phone }}" readonly><br>
					<label >Address:</label><br>
					<input type="text" value="{{ info.address }}" readonly><br>
					<label >City:</label><br>
					<input type="text" value="{{ info.city }}" readonly><br>
					<br>

					<p style="margin:0px 0px 5px 0px; font-size: 1.5rem;"><strong>Other Contacts </strong></p>
					<label >Emergency Contact Name:</label><br>
					<input type="text" value="{{ info.emergency_contact_name }}" readonly><br>
					<label >Emergency Contact Phone:</label><br>
					<input type="text" value="+233{{ info.emergency_contact_phone }}" readonly><br><br>
					<div class=" mb-12 mb-md-0 col-md-12">
						<a class="btn btn-primary btn-block" href="{% url 'client_info_update' %}">Update Info</a>
					</div>
				</form>
			</div>
          </div>
        </div>
      </div>
</div>

{% endblock content %}
