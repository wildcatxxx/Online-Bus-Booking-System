{% extends 'admin_base.html' %}

{% block content %}
<div class="container-fluid mt--3">
    <div class="row align-items-center justify-content-center">
        <div class="mb-6 mb-md-0 col-md-6">
            <div class="card" style="min-height: 53vh;">


                        <form method="post" class="row justify-content-center py-3 my-3 col-md-12">
                            <div class="section-title justify-content-center">
                            <h1 class="title">Company Form</h1>
                        </div>

                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-{{message.tags}}" role="alert">
                                    {{ message }}
                                </div>
                            {% endfor %}
                        {% endif %}
                            {% csrf_token %}
                            <div class="row col-lg-12 align-items-center ">
                                {% for field in com_form %}
                                <p class="col-md-6 px-3">
                                    {{ field.label_tag }}<br>
                                    {{ field }}
                                </p>
                            {% endfor %}

                            </div>
                            <div class="col-lg-10 ">
                                <button type="submit" class="btn btn-default">Create Company</button>
                            </div>

                        </form>
            </div>
        </div>

    </div>

</div>

	<!-- section -->
	<!-- /section -->
{% endblock%}
